name: ficus_app
description: Plant monitoring dashboard using Firebase Realtime Database.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.0
  firebase_database: ^11.1.4
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.69.0
  go_router: ^14.6.2
  intl: ^0.19.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
